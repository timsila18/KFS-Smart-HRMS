services:
  app:
    build:
      context: .
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_CHANNEL: stderr
      DB_CONNECTION: pgsql
      DB_SSLMODE: require
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
    ports:
      - "8080:8080"
    volumes:
      - storage:/var/www/html/storage
    restart: unless-stopped

  queue:
    build:
      context: .
    command: php artisan queue:work redis --queue=default,audit,reports --tries=3 --backoff=5 --max-time=3600
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_CHANNEL: stderr
      DB_CONNECTION: pgsql
      DB_SSLMODE: require
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
    volumes:
      - storage:/var/www/html/storage
    restart: unless-stopped

  scheduler:
    build:
      context: .
    command: php artisan schedule:work
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_CHANNEL: stderr
      DB_CONNECTION: pgsql
      DB_SSLMODE: require
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
    volumes:
      - storage:/var/www/html/storage
    restart: unless-stopped

volumes:
  storage:
