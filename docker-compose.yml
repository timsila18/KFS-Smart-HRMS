services:
  app:
    build:
      context: .
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_HOST: postgres
      REDIS_HOST: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      LOG_CHANNEL: stderr
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - storage:/var/www/html/storage

  queue:
    build:
      context: .
    command: php artisan queue:work redis --queue=default,audit,reports --tries=3 --backoff=5 --max-time=3600
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_HOST: postgres
      REDIS_HOST: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      LOG_CHANNEL: stderr
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - storage:/var/www/html/storage

  scheduler:
    build:
      context: .
    command: php artisan schedule:work
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_HOST: postgres
      REDIS_HOST: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      LOG_CHANNEL: stderr
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - storage:/var/www/html/storage

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: kfs_smart_hrms
      POSTGRES_USER: kfs_smart_hrms
      POSTGRES_PASSWORD: kfs_smart_hrms_change_me
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kfs_smart_hrms -d kfs_smart_hrms"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis:/data

volumes:
  postgres:
  redis:
  storage:
